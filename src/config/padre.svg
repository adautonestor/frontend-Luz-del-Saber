<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 450">
  <defs>
    <style>
      .title-box { fill: #10b981; stroke: #059669; stroke-width: 2; }
      .section-box { fill: #34d399; stroke: #10b981; stroke-width: 2; }
      .item-box { fill: white; stroke: #6ee7b7; stroke-width: 1.5; }
      .other-box { fill: #86efac; stroke: #10b981; stroke-width: 2; }
      .title-text { fill: white; font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
      .section-text { fill: white; font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
      .item-text { fill: #059669; font-family: Arial, sans-serif; font-size: 11px; }
      .line { stroke: #10b981; stroke-width: 2; fill: none; }
    </style>
  </defs>

  <!-- Title -->
  <rect x="200" y="10" width="200" height="40" rx="5" class="title-box"/>
  <text x="300" y="35" text-anchor="middle" class="title-text">PADRE</text>

  <!-- Main lines -->
  <line x1="300" y1="50" x2="300" y2="80" class="line"/>
  <line x1="300" y1="80" x2="100" y2="100" class="line"/>
  <line x1="300" y1="80" x2="300" y2="100" class="line"/>
  <line x1="300" y1="80" x2="500" y2="100" class="line"/>

  <!-- Left Section: VER NOTAS -->
  <rect x="20" y="100" width="160" height="35" rx="5" class="section-box"/>
  <text x="100" y="122" text-anchor="middle" class="section-text">VER NOTAS</text>

  <line x1="100" y1="135" x2="100" y2="155" class="line"/>

  <rect x="30" y="155" width="140" height="75" rx="5" class="item-box"/>
  <text x="40" y="172" class="item-text">• Mis Hijos</text>
  <text x="40" y="187" class="item-text">• Notas Académicas</text>
  <text x="40" y="202" class="item-text">• Boletas</text>
  <text x="40" y="217" class="item-text">• Mi Perfil</text>

  <!-- Center Section: VER ASISTENCIA -->
  <rect x="220" y="100" width="160" height="35" rx="5" class="section-box"/>
  <text x="300" y="122" text-anchor="middle" class="section-text">VER ASISTENCIA</text>

  <line x1="300" y1="135" x2="300" y2="155" class="line"/>

  <rect x="230" y="155" width="140" height="45" rx="5" class="item-box"/>
  <text x="240" y="172" class="item-text">• Asistencia</text>
  <text x="240" y="187" class="item-text">• Mis Hijos</text>

  <!-- Right Section: PAGAR PENSIONES -->
  <rect x="420" y="100" width="160" height="35" rx="5" class="section-box"/>
  <text x="500" y="122" text-anchor="middle" class="section-text">PAGAR PENSIONES</text>

  <line x1="500" y1="135" x2="500" y2="155" class="line"/>

  <rect x="430" y="155" width="140" height="30" rx="5" class="item-box"/>
  <text x="440" y="172" class="item-text">• Pagos</text>

  <!-- Connecting lines to OTROS -->
  <line x1="100" y1="230" x2="100" y2="260" class="line"/>
  <line x1="100" y1="260" x2="300" y2="280" class="line"/>

  <line x1="300" y1="200" x2="300" y2="280" class="line"/>

  <line x1="500" y1="185" x2="500" y2="260" class="line"/>
  <line x1="500" y1="260" x2="300" y2="280" class="line"/>

  <!-- Bottom Section: OTROS -->
  <rect x="220" y="280" width="160" height="35" rx="5" class="other-box"/>
  <text x="300" y="302" text-anchor="middle" class="section-text">OTROS</text>

  <line x1="300" y1="315" x2="300" y2="335" class="line"/>

  <rect x="230" y="335" width="140" height="75" rx="5" class="item-box"/>
  <text x="240" y="352" class="item-text">• Comunicados</text>
  <text x="240" y="367" class="item-text">• Avisos</text>
  <text x="240" y="382" class="item-text">• Documentos</text>
  <text x="240" y="397" class="item-text">• Mi Perfil</text>
</svg>