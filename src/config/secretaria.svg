<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380">
  <defs>
    <style>
      .title-box { fill: #8b5cf6; stroke: #6d28d9; stroke-width: 2; }
      .section-box { fill: #a78bfa; stroke: #7c3aed; stroke-width: 2; }
      .item-box { fill: white; stroke: #c4b5fd; stroke-width: 1.5; }
      .title-text { fill: white; font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
      .section-text { fill: white; font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
      .item-text { fill: #6d28d9; font-family: Arial, sans-serif; font-size: 11px; }
      .line { stroke: #7c3aed; stroke-width: 2; fill: none; }
    </style>
  </defs>

  <!-- Title -->
  <rect x="200" y="10" width="200" height="40" rx="5" class="title-box"/>
  <text x="300" y="35" text-anchor="middle" class="title-text">SECRETARÍA</text>

  <!-- Main lines -->
  <line x1="300" y1="50" x2="300" y2="80" class="line"/>
  <line x1="300" y1="80" x2="100" y2="100" class="line"/>
  <line x1="300" y1="80" x2="300" y2="100" class="line"/>
  <line x1="300" y1="80" x2="500" y2="100" class="line"/>

  <!-- Left Section: MATRICULAR -->
  <rect x="20" y="100" width="160" height="35" rx="5" class="section-box"/>
  <text x="100" y="122" text-anchor="middle" class="section-text">MATRICULAR</text>

  <line x1="100" y1="135" x2="100" y2="155" class="line"/>

  <rect x="30" y="155" width="140" height="120" rx="5" class="item-box"/>
  <text x="40" y="172" class="item-text">• Usuarios</text>
  <text x="40" y="187" class="item-text">• Matrícula</text>
  <text x="40" y="202" class="item-text">• Estructura</text>
  <text x="40" y="217" class="item-text">• Horarios</text>
  <text x="40" y="232" class="item-text">• Boletas</text>
  <text x="40" y="247" class="item-text">• Rúbricas</text>
  <text x="40" y="262" class="item-text">• Config.</text>

  <!-- Center Section: COBRAR -->
  <rect x="220" y="100" width="160" height="35" rx="5" class="section-box"/>
  <text x="300" y="122" text-anchor="middle" class="section-text">COBRAR</text>

  <line x1="300" y1="135" x2="300" y2="155" class="line"/>

  <rect x="230" y="155" width="140" height="60" rx="5" class="item-box"/>
  <text x="240" y="172" class="item-text">• Pagos</text>
  <text x="240" y="187" class="item-text">• Asistencia</text>
  <text x="240" y="202" class="item-text">• Documentos</text>

  <!-- Right Section: COMUNICAR -->
  <rect x="420" y="100" width="160" height="35" rx="5" class="section-box"/>
  <text x="500" y="122" text-anchor="middle" class="section-text">COMUNICAR</text>

  <line x1="500" y1="135" x2="500" y2="155" class="line"/>

  <rect x="430" y="155" width="140" height="60" rx="5" class="item-box"/>
  <text x="440" y="172" class="item-text">• Comunicados</text>
  <text x="440" y="187" class="item-text">• Avisos</text>
  <text x="440" y="202" class="item-text">• Documentos</text>
</svg>