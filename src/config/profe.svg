<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 350">
  <defs>
    <style>
      .title-box { fill: #2563eb; stroke: #1e40af; stroke-width: 2; }
      .section-box { fill: #3b82f6; stroke: #2563eb; stroke-width: 2; }
      .item-box { fill: white; stroke: #93c5fd; stroke-width: 1.5; }
      .title-text { fill: white; font-family: Arial, sans-serif; font-size: 18px; font-weight: bold; }
      .section-text { fill: white; font-family: Arial, sans-serif; font-size: 14px; font-weight: bold; }
      .item-text { fill: #1e40af; font-family: Arial, sans-serif; font-size: 11px; }
      .line { stroke: #2563eb; stroke-width: 2; fill: none; }
    </style>
  </defs>

  <!-- Title -->
  <rect x="200" y="10" width="200" height="40" rx="5" class="title-box"/>
  <text x="300" y="35" text-anchor="middle" class="title-text">PROFESOR</text>

  <!-- Main lines -->
  <line x1="300" y1="50" x2="300" y2="80" class="line"/>
  <line x1="300" y1="80" x2="100" y2="100" class="line"/>
  <line x1="300" y1="80" x2="300" y2="100" class="line"/>
  <line x1="300" y1="80" x2="500" y2="100" class="line"/>

  <!-- Left Section: TOMAR ASISTENCIA -->
  <rect x="20" y="100" width="160" height="35" rx="5" class="section-box"/>
  <text x="100" y="122" text-anchor="middle" class="section-text">TOMAR ASISTENCIA</text>

  <line x1="100" y1="135" x2="100" y2="155" class="line"/>

  <rect x="30" y="155" width="140" height="60" rx="5" class="item-box"/>
  <text x="40" y="172" class="item-text">• Asistencia</text>
  <text x="40" y="187" class="item-text">• Mis Cursos</text>
  <text x="40" y="202" class="item-text">• Horarios</text>

  <!-- Center Section: REGISTRAR NOTAS -->
  <rect x="220" y="100" width="160" height="35" rx="5" class="section-box"/>
  <text x="300" y="122" text-anchor="middle" class="section-text">REGISTRAR NOTAS</text>

  <line x1="300" y1="135" x2="300" y2="155" class="line"/>

  <rect x="230" y="155" width="140" height="60" rx="5" class="item-box"/>
  <text x="240" y="172" class="item-text">• Mis Cursos</text>
  <text x="240" y="187" class="item-text">• Notas</text>
  <text x="240" y="202" class="item-text">• Horarios</text>

  <!-- Right Section: COMUNICAR CON PADRES -->
  <rect x="420" y="100" width="160" height="35" rx="5" class="section-box"/>
  <text x="500" y="122" text-anchor="middle" class="section-text">COMUNICAR</text>

  <line x1="500" y1="135" x2="500" y2="155" class="line"/>

  <rect x="430" y="155" width="140" height="75" rx="5" class="item-box"/>
  <text x="440" y="172" class="item-text">• Comunicados</text>
  <text x="440" y="187" class="item-text">• Avisos</text>
  <text x="440" y="202" class="item-text">• Documentos</text>
  <text x="440" y="217" class="item-text">• Mis Cursos</text>
</svg>